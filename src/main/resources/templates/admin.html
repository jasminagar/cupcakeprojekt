<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel</title>
</head>
<body>

<!-- Fælles header -->
<div th:replace="fragments/header :: header"></div>

<h1>Admin Panel</h1>

<!-- Sektion 1: Tilføj saldo -->
<section>
    <h2>Tilføj saldo til bruger</h2>
    <form th:action="@{/admin/addBalance}" method="post">
        <label for="userId">Bruger ID:</label>
        <input type="number" id="userId" name="userId" required><br>

        <label for="amount">Beløb at tilføje:</label>
        <input type="number" id="amount" name="amount" step="0.01" required><br>

        <button type="submit">Tilføj beløb</button>
    </form>
</section>

<hr>

<!-- Sektion 2: Vis alle ordrer -->
<section>
    <h2>Alle ordrer</h2>
    <table border="1">
        <thead>
        <tr>
            <th>Ordre ID</th>
            <th>Bruger</th>
            <th>Afhentningstid</th>
            <th>Total pris</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.email}"></td> <!-- fix: tidligere userEmail -->
            <td th:text="${order.pickupTime}"></td>
            <td th:text="${order.totalPrice}"></td>
        </tr>
        </tbody>
    </table>
</section>

<hr>

<!-- Sektion 3: Detaljer om ordrelinjer -->
<section>
    <h2>Ordrelinjer</h2>
    <table border="1">
        <thead>
        <tr>
            <th>Ordre ID</th>
            <th>Bottom</th>
            <th>Topping</th>
            <th>Quantity</th>
            <th>Linjepris</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="line : ${orderLines}">
            <td th:text="${line.orderId}"></td>
            <td th:text="${line.bottomFlavour}"></td> <!-- fix: tidligere bottomName -->
            <td th:text="${line.topFlavour}"></td>    <!-- fix: tidligere topName -->
            <td th:text="${line.quantity}"></td>
            <td th:text="${line.linePrice}"></td>
        </tr>
        </tbody>
    </table>
</section>

</body>
</html>
