<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/header.css">

    <style>
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-family: "Cormorant Garamond", serif;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #7d2183, #c189d6);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .switch-link {
            margin-top: 10px;
            display: block;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            color: white;
            padding: 0;
            font: inherit;
        }

        .message {
            color: #ffb3b3;
            margin-top: 16px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="form-page">
    <section class="form-card">

        <div class="auth-tabs">
            <button type="button" id="loginTab" class="auth-tab" onclick="showForm('login')">Login</button>
            <button type="button" id="registerTab" class="auth-tab" onclick="showForm('register')">Register</button>
        </div>

        <div id="loginForm" class="auth-form">
            <h1>Login</h1>

            <form method="post" action="/login" class="login-form">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" name="email" type="email" required>

                <label for="loginUsername">Username</label>
                <input id="loginUsername" name="username" required>

                <label for="loginPassword">Password</label>
                <input id="loginPassword" name="password" type="password" required>

                <button type="submit">Login</button>
            </form>

            <button type="button" class="switch-link" onclick="showForm('register')">
                Har du ikke en bruger? Opret dig her!
            </button>
        </div>

        <div id="registerForm" class="auth-form">
            <h1>Register</h1>

            <form method="post" action="/registerUser" class="login-form">
                <label for="registerEmail">Email</label>
                <input id="registerEmail" name="email" type="email" required>

                <label for="registerUsername">Username</label>
                <input id="registerUsername" name="username" required>

                <label for="registerPassword">Password</label>
                <input id="registerPassword" name="password" type="password" required>

                <label for="registerBalance">Balance</label>
                <input id="registerBalance" name="balance" type="number" step="0.01" required>

                <button type="submit">Register</button>
            </form>

            <button type="button" class="switch-link" onclick="showForm('login')">
                Har du allerede en bruger? Log ind
            </button>
        </div>

        <p th:if="${message}" th:text="${message}" class="message"></p>

    </section>
</main>

<script>
    function showForm(type) {
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const loginTab = document.getElementById("loginTab");
        const registerTab = document.getElementById("registerTab");

        if (type === "register") {
            registerForm.classList.add("active");
            loginForm.classList.remove("active");
            registerTab.classList.add("active");
            loginTab.classList.remove("active");
        } else {
            loginForm.classList.add("active");
            registerForm.classList.remove("active");
            loginTab.classList.add("active");
            registerTab.classList.remove("active");
        }
    }

    const activeTab = "[[${activeTab}]]";
    if (activeTab === "register") {
        showForm("register");
    } else {
        showForm("login");
    }
</script>

<script src="/js/script.js"></script>
</body>
</html>
