<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/header.css">

    <style>
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-family: "Cormorant Garamond", serif;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #7d2183, #c189d6);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .switch-link {
            margin-top: 10px;
            display: block;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="form-page">
    <section class="form-card">

        <!-- TABS -->
        <div class="auth-tabs">
            <button id="loginTab" class="auth-tab active" onclick="showForm('login')">Login</button>
            <button id="registerTab" class="auth-tab" onclick="showForm('register')">Register</button>
        </div>

        <!-- LOGIN -->
        <div id="loginForm" class="auth-form active">
            <h1>Login</h1>

            <form method="post" action="/login" class="login-form">
                <label for="email">Email</label>
                <input id="email" name="email" required>

                <label for="username">Username</label>
                <input id="username" name="username" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>

                <button type="submit">Login</button>
            </form>

            <span class="switch-link" onclick="showForm('register')">
                Har du ikke en bruger? Opret dig her!
            </span>
        </div>

        <!-- REGISTER -->
        <div id="registerForm" class="auth-form">
            <h1>Register</h1>

            <form method="post" action="/registerUser" class="login-form">
                <label>Email</label>
                <input name="email" required>

                <label>Username</label>
                <input name="username" required>

                <label>Password</label>
                <input name="password" type="password" required>

                <label>Balance</label>
                <input name="balance" required>

                <button type="submit">Register</button>
            </form>

            <span class="switch-link" onclick="showForm('login')">
                Har du allerede en bruger? Log ind
            </span>
        </div>

        <p th:if="${message}" th:text="${message}" style="color:red;"></p>

    </section>
</main>

<script>
    function showForm(type) {
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const loginTab = document.getElementById("loginTab");
        const registerTab = document.getElementById("registerTab");

        if (type === "login") {
            loginForm.classList.add("active");
            registerForm.classList.remove("active");
            loginTab.classList.add("active");
            registerTab.classList.remove("active");
        } else {
            registerForm.classList.add("active");
            loginForm.classList.remove("active");
            registerTab.classList.add("active");
            loginTab.classList.remove("active");
        }
    }
</script>

<script src="/js/script.js"></script>

</body>
</html>
