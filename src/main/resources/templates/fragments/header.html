<!--Med i rapport-->

<div th:fragment="header">


    <div class="site-nav-right">
        <span th:if="${currentUser != null}">
            Logget ind som: <span th:text="${currentUser.email}">email@example.com</span>
        </span>
        <a th:if="${currentUser != null}" th:href="@{/logout}">Log ud</a>
        <a th:if="${currentUser == null}" th:href="@{/login}">Log ind</a>

        <div class="cart-dropdown-wrapper">
            <button id="cartButton" type="button" aria-label="Åbn kurv">
                🛒
                <span class="cart-count" th:text="${cart != null ? #lists.size(cart) : 0}">0</span>
            </button>

            <div class="cart-dropdown" id="cartDropdown">
                <div th:if="${cart == null || #lists.isEmpty(cart)}">Din kurv er tom</div>

                <div th:each="item, iterStat : ${cart}" class="cart-item">
                    <strong th:text="${item.bottomName} + ' + ' + item.toppingName">Cupcake</strong>
                    <span>Antal: <span th:text="${item.quantity}">1</span></span>
                    <span>Pris: <span th:text="${#numbers.formatDecimal(item.totalPrice,1,2)}">0.00</span> kr</span>

                    <form th:action="@{'/cart/remove/' + ${iterStat.index}}" method="post">
                        <button type="submit">Slet</button>
                    </form>
                </div>

                <div class="cart-total">
                    Total:
                    <span th:text="${#numbers.formatDecimal(totalCartPrice != null ? totalCartPrice : 0,1,2)}">
                        0.00
                    </span> kr
                </div>

                <form th:action="@{/checkout}" method="post">
                    <button type="submit">Betal</button>
                </form>
            </div>
        </div>
    </div>

    <header class="hero page-shell">
        <div class="hero-top">
            <div class="brand-row">
                <img class="brand-cupcake" src="/images/purple-cupcake.png" alt="Cupcake" />

                <div class="brand-copy">
                    <h1 class="brand-title">Olsker Cupcakes</h1>
                    <p class="brand-subtitle">Små cupcakes, store smil</p>
                </div>

                <img class="brand-cupcake" src="/images/purple-cupcake.png" alt="Cupcake" />
            </div>
        </div>

        <nav class="nav-bar">
            <a class="nav-link" href="#vores-cupcakes">Vores cupcakes</a>
            <a class="nav-link" href="#om-os">Om os</a>
            <a class="nav-link" href="#kontakt">Kontakt</a>
        </nav>

        <div class="hero-image-wrap">
            <img class="hero-image" src="/images/cupcake-hero.png" alt="Der sprøjtes smørcreme på cupcakes" />
        </div>
    </header>

</div>
