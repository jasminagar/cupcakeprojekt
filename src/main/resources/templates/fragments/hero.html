<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<body>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italianno&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">


<link rel="stylesheet" href="/css/hero.css">

<div th:fragment="hero">
  <section id="vores-cupcakes" class="hero-extension page-shell">
    <div class="hero-image-wrap">
      <img class="hero-image" src="/images/cupcake-hero.png" alt="Der sprøjtes smørcreme på cupcakes" />
    </div>

    <div class="sectionheader ">
      <h2 class="sectiontitle introitalioano">Vores cupcakes</h2>
      <img class="herocupcakeimg" src="/images/pink-cupcake.png" alt="Lyserød cupcake" />
    </div>

    <div class="intro-grid ">
      <div class="intro-card">
        <p>
          Gå på opdagelse i vores udvalg af lækre cupcakebunde og smørcremer og sammensæt din helt egen cupcake –
          eller vælg blandt vores færdiglavede favoritter.
        </p>
      </div>

      <div class="jump-links">
        <a class="jump-card" href="#bunde">Klik her for at se vores udvalg af bunde</a>
        <a class="jump-card" href="#smorcremer">Klik her for at se vores udvalg af smørcremer</a>
        <a class="cta-link" th:href="@{/order}">Klik her for at bestille</a>
      </div>
    </div>
  </section>
</div>

</body>
</html>
