<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bestil Cupcakes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/header.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="form-page">
    <section class="form-card">
        <h1>Bestil dine cupcakes</h1>

        <p>Antal bottoms: <span th:text="${#lists.size(bottoms)}">0</span></p>
        <p>Antal toppings: <span th:text="${#lists.size(toppings)}">0</span></p>
        <p>Din saldo: <span th:text="${currentUser.balance}">0</span> kr.</p>

        <form th:action="@{/cart/add}" method="post" th:object="${orderRequest}" class="login-form">
            <label for="bottom">Vælg bund</label>
            <select name="bottomId" id="bottom" required>
                <option th:each="bottom : ${bottoms}"
                        th:value="${bottom.id}"
                        th:text="${bottom.flavour + ' - ' + bottom.price + ' kr'}">
                </option>
            </select>

            <label for="topping">Vælg top</label>
            <select name="toppingId" id="topping" required>
                <option th:each="top : ${toppings}"
                        th:value="${top.id}"
                        th:text="${top.flavour + ' - ' + top.price + ' kr'}">
                </option>
            </select>

            <label for="quantity">Antal</label>
            <input type="number" name="quantity" id="quantity" min="1" value="1" required>

            <label for="pickupTime">Afhentningstid</label>
            <input type="datetime-local" name="pickupTime" id="pickupTime" required>

            <button type="submit">Tilføj til kurv</button>
        </form>
    </section>
</main>

<script src="/js/script.js"></script>
</body>
</html>
